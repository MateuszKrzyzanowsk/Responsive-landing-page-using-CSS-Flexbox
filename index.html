<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="holder1">
    <picture>
    <source media="(min-width: 48rem)" srcset="./images/image-product-desktop.jpg">
    <img src="./images/image-product-mobile.jpg" alt="image of our product"> 
    </picture>
    <div class="holder2">
      <h2>Perfume</h2>

     <h1>Gabrielle Essence Eau De Parfum</h1>

     <p>
        A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.
        
      </p>

    <section>
      <h1>$149.99</h1>
      <p>
         $169.99
      </p>
    </section>
    <button>
      <img src="./images/icon-cart.svg" alt="image of shopping cart">
      <h3>Add to Cart</h3>
    </button>
    </div>
  </div>
</body>
</html>
